# XcodeGen spec for the sample app — generates a buildable iOS project from the
# committed source, so no manual Xcode wizard/clicking is needed:
#
#   brew install xcodegen          # one-time
#   cd Examples/BonsaiDemo
#   xcodegen generate              # -> BonsaiDemo.xcodeproj (gitignored)
#   open BonsaiDemo.xcodeproj      # then set your signing team + run to a device
#
# Or build from the CLI without a device (compile check only):
#   xcodebuild -project BonsaiDemo.xcodeproj -scheme BonsaiDemo \
#     -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build
name: BonsaiDemo
options:
  bundleIdPrefix: com.yourname     # change to your reverse-domain
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  BonsaiEngine:
    path: ../..          # the bonsai-image-ios package root
targets:
  BonsaiDemo:
    type: application
    platform: iOS
    sources:
      - BonsaiDemoApp.swift
      - ContentView.swift
      # Bundle the weights: drop the model into Examples/BonsaiDemo/bonsai-model/
      # before `xcodegen generate` (see README). Optional so the project still
      # builds without them (the app then shows "weights not found").
      - path: bonsai-model
        type: folder
        optional: true
        buildPhase: resources
    dependencies:
      - package: BonsaiEngine
        product: BonsaiEngine
    info:
      path: Generated/Info.plist
      properties:
        UILaunchScreen: {}
    entitlements:
      path: Generated/BonsaiDemo.entitlements
      properties:
        # The working set peaks ~4.6 GB; without the raised cap a 6 GB phone jetsams.
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        # Change to a bundle id YOUR Apple team can register, then set your Team
        # in Xcode ▸ Signing & Capabilities (signing is per-developer).
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.BonsaiDemo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        GENERATE_INFOPLIST_FILE: NO
